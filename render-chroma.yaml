# Blueprint minimal : uniquement ChromaDB (à déployer en premier sur un nouveau compte Render).
# Dashboard → New → Blueprint → connecter ce dépôt → fichier render-chroma.yaml
#
# Après déploiement : copiez l’URL publique du service (https://chromadb-….onrender.com)
# et utilisez-la comme CHROMA_URL pour l’app Node (ou le blueprint complet render.yaml).
#
# Disque persistant : non inclus (non disponible sur l’offre gratuite). Pour activer un disque,
# dans Render → service chromadb → Disks → Add disk, mount path /data, puis redéployer.

services:
  - type: web
    name: chromadb
    runtime: docker
    plan: starter
    region: frankfurt
    dockerfilePath: ./deploy/chroma/Dockerfile
    healthCheckPath: /api/v2/heartbeat
    autoDeploy: true
