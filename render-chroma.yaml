# Chroma SEUL (pas l’app Node). Si tout d’un coup : utiliser render.yaml à la racine.
# Blueprint : New → Blueprint → repo → chemin du fichier : render-chroma.yaml
# Puis sur l’app Node : CHROMA_URL = https://chromadb-….onrender.com (copiée depuis le dashboard).
# plan: free — gratuit Render (limites : veille, filesystem éphémère). starter = payant + carte.
# Disque persistant : réservé aux plans payants — sur free, données Chroma perdues au redémarrage.

services:
  - type: web
    name: chromadb
    runtime: docker
    plan: free
    region: frankfurt
    dockerfilePath: ./deploy/chroma/Dockerfile
    healthCheckPath: /api/v2/heartbeat
    autoDeploy: true
