# Blueprint pour le bot DevOps Assistant uniquement
# Utilise le service Chroma existant : https://chromadb-qow6.onrender.com
# Render → New → Blueprint → repo → render-bot-only.yaml

services:
  - type: web
    name: devops-assistant-bot
    env: node
    plan: free
    region: frankfurt
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: REDIS_URL
        value: redis://localhost:6379
      - key: FRONTEND_ORIGINS
        sync: false
      # Configuration RAG avec Chroma existant
      - key: RAG_ENABLED
        value: "true"
      - key: RAG_COLLECTION
        value: devops_courses
      - key: CHROMA_URL
        value: https://chromadb-qow6.onrender.com
      - key: CHROMA_FALLBACK_URL
        value: http://localhost:8000
      - key: RAG_RETRIEVAL_TOP_K
        value: "16"
      - key: RAG_MAX_CHUNKS_PER_DOC
        value: "1200"
      - key: RAG_INGEST_BATCH_SIZE
        value: "4"
