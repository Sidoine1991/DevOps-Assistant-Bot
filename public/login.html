<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - DevOps Assistant Bot</title>
    <link rel="icon" type="image/png" href="/media/Logo%20du%20bot%20DevOps%20Assistant.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        body { overflow: auto; }
        .auth-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
        .auth-card {
            width: 100%;
            max-width: 480px;
            background: rgba(255,255,255,.95);
            border-radius: 16px;
            box-shadow: 0 16px 34px rgba(0,0,0,.15);
            padding: 1.25rem;
        }
        .logo { width: 92px; height: 92px; object-fit: contain; display:block; margin: 0 auto .65rem; border-radius: 12px; background:#fff; }
        .auth-card h2 { margin-bottom: .35rem; color: #1f2937; text-align:center; }
        .auth-card p { margin-bottom: 1rem; color: #4b5563; font-size: .92rem; text-align:center; }
        .auth-card input { width:100%; padding:.7rem; border:1px solid #d1d5db; border-radius:10px; margin-bottom:.6rem; }
        .auth-card button { width:100%; border:none; border-radius:10px; padding:.7rem; margin-bottom:.5rem; cursor:pointer; font-weight:600; }
        .btn-main { background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; }
        .btn-alt { background: #eef2ff; color: #374151; }
        .msg { min-height: 1.1rem; font-size: .86rem; color: #374151; margin-top: .25rem; }
        .links { margin-top: .65rem; font-size: .86rem; display:flex; justify-content: space-between; }
        .links a { color: #374151; }
    </style>
</head>
<body>
    <div class="auth-wrap">
        <div class="auth-card">
            <img class="logo" src="/media/Logo%20du%20bot%20DevOps%20Assistant.png" alt="Logo DevOps Assistant Bot">
            <h2>Se connecter</h2>
            <p>Entrez votre email et mot de passe pour vous connecter.</p>

            <input id="email" type="email" placeholder="email@exemple.com">
            <input id="password" type="password" placeholder="Mot de passe">
            <button id="loginBtn" class="btn-main">Se connecter</button>
            <div id="msg" class="msg"></div>

            <div class="links">
                <a href="/home.html">Retour accueil</a>
                <a href="/registration.html">S'inscrire</a>
            </div>
        </div>
    </div>

    <script>
        const msg = document.getElementById('msg');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        document.getElementById('loginBtn').addEventListener('click', async () => {
            const email = (emailInput.value || '').trim();
            const password = (passwordInput.value || '').trim();
            if (!email || !password) {
                msg.textContent = 'Email et mot de passe requis.';
                return;
            }
            const res = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            const data = await res.json();
            msg.textContent = data.message || 'Reponse serveur.';
            if (data.success && data.user && data.user.id) {
                localStorage.setItem('devops-user-id', data.user.id);
                localStorage.setItem('devops-user-verified', 'true');
                localStorage.setItem('devops-user-name', data.user.fullName || '');
                window.location.href = '/index.html';
            }
        });
    </script>
</body>
</html>
