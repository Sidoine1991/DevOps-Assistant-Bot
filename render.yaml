# Blueprint complet : Chroma (Docker) + app Node.
# Render → New → Blueprint → repo → ce fichier (render.yaml à la racine).
# CHROMA_URL est injectée automatiquement depuis le service "chromadb".
#
# Plan free : pas de facturation Render pour ces instances (limites : mise en veille, pas de disque persistant).
# plan: starter = payant → Render demande une carte. Pour éviter ça, on utilise free ci-dessous.
# Si Render exige quand même une carte : vérifier les conditions du compte sur render.com/docs (parfois vérif anti-abus).
#
# Si tu ne veux déployer que Chroma au début : utilise render-chroma.yaml à la place.

services:
  - type: web
    name: chromadb
    runtime: docker
    plan: free
    region: frankfurt
    dockerfilePath: ./deploy/chroma/Dockerfile
    healthCheckPath: /api/v2/heartbeat
    autoDeploy: true

  - type: web
    name: devops-assistant-bot
    env: node
    plan: free
    region: frankfurt
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: RAG_ENABLED
        value: "true"
      - key: RAG_COLLECTION
        value: devops_courses
      - key: CHROMA_URL
        fromService:
          name: chromadb
          type: web
          envVarKey: RENDER_EXTERNAL_URL
      - key: CHROMA_FALLBACK_URL
        sync: false
      - key: RAG_RETRIEVAL_TOP_K
        value: "16"
      - key: RAG_MAX_CHUNKS_PER_DOC
        value: "1200"
      - key: RAG_INGEST_BATCH_SIZE
        value: "4"
      - key: FRONTEND_ORIGINS
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_SECURE
        value: "false"
