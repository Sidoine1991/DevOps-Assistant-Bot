services:
  - type: web
    name: devops-assistant-bot
    env: node
    plan: starter
    region: frankfurt
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: RAG_ENABLED
        value: "true"
      - key: RAG_COLLECTION
        value: devops_courses
      - key: CHROMA_HOST
        sync: false
      - key: CHROMA_PORT
        value: "8000"
      - key: CHROMA_SSL
        value: "false"
